  <!-- Steam center -->
  <path d="M256 252 Q244 229 256 206 Q268 183 256 160"
        stroke="rgba(255,255,255,0.78)" stroke-width="13" stroke-linecap="round" fill="none"/>
  <!-- Steam right -->
